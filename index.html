<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 1</title>
</head>

    <style>

        #btn{
            margin-left: 46%;
        }

    </style>

<body>

    <br><br><br><br><br><br><br><br>
    
    <h1 class="text-center">Electricity Consumption Classifier</h1><br>

    <input type="text" class="form-control" id="Age" placeholder="Input your energy consumption rate..." size="50"><br>

    <button class="btn btn-info" onclick="checkAge()" id="btn">Check</button>

    <script>

        function checkAge(){
        var kWh = document.getElementById("Age").value;
        let cat1 = "Lifeline Consumer";
        let cat2 = "Low Consumption";
        let cat3 = "Average Consumption";
        let cat4 = "High Consumption";
        let cat5 = "Very High Consumption";
            if (isNaN(kWh)  ||  kWh < 0){
                alert("Please input a valid number");
            }
            else if(kWh <= 100){
                alert(cat1 + ": You have a discounted rate.");
            }
            else if((kWh >= 101) && (kWh<=200)){
                alert(cat2 + ": You have a normal residential rate.");
            }
            else if((kWh >= 201) && (kWh<=300)){
                alert(cat3 + ": You have a typical electricity usage.");
            }
            else if((kWh >= 301) && (kWh<=500)){
                alert(cat4 + ": You have a higher electricity usage.");
            }
            else if(kWh >= 501){
                alert(cat5 + ": You are a heavy electricity user.");
            }
            else{}

        }

    </script>
    
</body>
</html>
